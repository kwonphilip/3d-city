name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy from'
        required: false
        default: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

# Pages tolerates only one in-flight deployment; cancel earlier in-progress
# runs so a fast follow-up commit doesn't queue behind a stale build.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      # Pages serves 404.html for any unknown path. Mirroring index.html
      # there gives the SPA shell to deep links (e.g. /3d-city/map) and
      # page refreshes, so the router can take over instead of 404'ing.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
